<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Universal real-time voice translator powered by Grok AI.">
  <meta name="theme-color" content="#6C63FF">

  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Grok Translate">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Open Graph -->
  <meta property="og:title" content="Grok Translate">
  <meta property="og:description" content="Universal real-time voice translator powered by Grok AI.">
  <meta property="og:type" content="website">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>Grok Translate</title>

  <style>
    /* Prevent flash of unstyled content */
    body {
      background-color: #1A1A2E;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #loading .icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #6C63FF, #00D4AA);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-size: 36px;
    }
    #loading h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px 0;
      letter-spacing: -0.5px;
    }
    #loading p {
      font-size: 14px;
      opacity: 0.6;
      margin: 0;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(108,99,255,0.2);
      border-top-color: #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="icon">🌐</div>
    <h1>Grok Translate</h1>
    <p>Universal voice translator</p>
    <div class="spinner"></div>
  </div>

  <script>
    // Register service worker for offline PWA support
    if ('serviceWorker' in navigator) {
      window.addEventListener('flutter-first-frame', function () {
        navigator.serviceWorker.register('flutter_service_worker.js?v=' + Date.now());
      });
    }

    // Hide loading screen once Flutter renders
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.transition = 'opacity 0.4s ease';
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 400);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
